apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: erp_solution-ingress
  namespace: erp_solution
  labels:
    app.kubernetes.io/name: erp_solution-ingress
    app.kubernetes.io/part-of: erp_solution
  annotations:
    kubernetes.io/ingress.class: "nginx"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "300"
    nginx.ingress.kubernetes.io/rate-limit: "1000"
    nginx.ingress.kubernetes.io/rate-limit-window: "1m"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/cors-allow-origin: "https://erp-domain.com,https://admin.erp-domain.com,https://store.erp-domain.com"
    nginx.ingress.kubernetes.io/cors-allow-methods: "GET, PUT, POST, DELETE, PATCH, OPTIONS"
    nginx.ingress.kubernetes.io/cors-allow-headers: "DNT,X-CustomHeader,Keep-Alive,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Authorization"
    nginx.ingress.kubernetes.io/cors-allow-credentials: "true"
spec:
  tls:
  - hosts:
    - api.erp-domain.com
    - admin.erp-domain.com
    - store.erp-domain.com
    - erp-domain.com
    secretName: erp_solution-tls
  rules:
  - host: api.erp-domain.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: erp_solution-api
            port:
              number: 3000
  - host: admin.erp-domain.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: erp_solution-web
            port:
              number: 80
  - host: store.erp-domain.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: erp_solution-web
            port:
              number: 80
  - host: erp-domain.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: erp_solution-web
            port:
              number: 80

