apiVersion: apps/v1
kind: Deployment
metadata:
  name: erp_solution-web
  namespace: erp_solution
  labels:
    app.kubernetes.io/name: erp_solution-web
    app.kubernetes.io/component: web
    app.kubernetes.io/part-of: erp_solution
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: erp_solution-web
  template:
    metadata:
      labels:
        app.kubernetes.io/name: erp_solution-web
        app.kubernetes.io/component: web
        app.kubernetes.io/part-of: erp_solution
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
      containers:
      - name: web
        image: ghcr.io/nyeinpyaesone-ui/erp_solution-web:latest
        imagePullPolicy: Always
        ports:
        - name: http
          containerPort: 80
          protocol: TCP
        env:
        - name: NEXT_PUBLIC_API_URL
          value: "https://api.erp-domain.com/api/v1"
        - name: NEXT_PUBLIC_APP_NAME
          value: "ERP SOLUTION"
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /api/health
            port: 80
          initialDelaySeconds: 10
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /api/health
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: erp_solution-web
  namespace: erp_solution
  labels:
    app.kubernetes.io/name: erp_solution-web
    app.kubernetes.io/component: web
spec:
  type: ClusterIP
  ports:
  - name: http
    port: 80
    targetPort: 80
    protocol: TCP
  selector:
    app.kubernetes.io/name: erp_solution-web
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: erp_solution-web-hpa
  namespace: erp_solution
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: erp_solution-web
  minReplicas: 2
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70

