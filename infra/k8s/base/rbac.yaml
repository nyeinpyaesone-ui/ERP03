apiVersion: v1
kind: ServiceAccount
metadata:
  name: erp_solution
  namespace: erp_solution
  labels:
    app.kubernetes.io/name: erp_solution
    app.kubernetes.io/part-of: erp_solution
automountServiceAccountToken: true
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: erp_solution
  namespace: erp_solution
  labels:
    app.kubernetes.io/name: erp_solution
    app.kubernetes.io/part-of: erp_solution
rules:
- apiGroups: [""]
  resources: ["pods", "services", "endpoints", "configmaps", "secrets"]
  verbs: ["get", "list", "watch"]
- apiGroups: ["apps"]
  resources: ["deployments", "statefulsets"]
  verbs: ["get", "list", "watch"]
- apiGroups: ["autoscaling"]
  resources: ["horizontalpodautoscalers"]
  verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: erp_solution
  namespace: erp_solution
  labels:
    app.kubernetes.io/name: erp_solution
    app.kubernetes.io/part-of: erp_solution
subjects:
- kind: ServiceAccount
  name: erp_solution
  namespace: erp_solution
roleRef:
  kind: Role
  name: erp_solution
  apiGroup: rbac.authorization.k8s.io

