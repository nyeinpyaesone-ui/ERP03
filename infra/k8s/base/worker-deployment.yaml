apiVersion: apps/v1
kind: Deployment
metadata:
  name: erp_solution-worker
  namespace: erp_solution
  labels:
    app.kubernetes.io/name: erp_solution-worker
    app.kubernetes.io/component: worker
    app.kubernetes.io/part-of: erp_solution
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: erp_solution-worker
  template:
    metadata:
      labels:
        app.kubernetes.io/name: erp_solution-worker
        app.kubernetes.io/component: worker
        app.kubernetes.io/part-of: erp_solution
    spec:
      serviceAccountName: erp_solution
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
      containers:
      - name: worker
        image: ghcr.io/nyeinpyaesone-ui/erp_solution-worker:latest
        imagePullPolicy: Always
        env:
        - name: NODE_ENV
          value: "production"
        - name: WORKER_CONCURRENCY
          value: "5"
        envFrom:
        - configMapRef:
            name: erp_solution-config
        - secretRef:
            name: erp_solution-secrets
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "1Gi"
            cpu: "500m"
        livenessProbe:
          exec:
            command:
            - node
            - -e
            - "require('http').get('http://localhost:3000/health/live')"
          initialDelaySeconds: 30
          periodSeconds: 30
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app.kubernetes.io/name
                  operator: In
                  values:
                  - erp_solution-worker
              topologyKey: kubernetes.io/hostname
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: erp_solution-worker-hpa
  namespace: erp_solution
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: erp_solution-worker
  minReplicas: 2
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Pods
    pods:
      metric:
        name: queue_depth
      target:
        type: AverageValue
        averageValue: "50"

