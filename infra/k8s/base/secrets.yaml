apiVersion: v1
kind: Secret
metadata:
  name: erp_solution-secrets
  namespace: erp_solution
  labels:
    app.kubernetes.io/name: erp_solution
    app.kubernetes.io/component: secrets
type: Opaque
stringData:
  # Database
  DB_USER: "erp_solution_user"
  DB_PASSWORD: "REPLACE_WITH_SECURE_PASSWORD"
  DB_URL: "postgresql://erp_solution_user:REPLACE_WITH_SECURE_PASSWORD@erp_solution-postgres:5432/erp_solution_production?sslmode=require"

  # Redis
  REDIS_PASSWORD: "REPLACE_WITH_SECURE_PASSWORD"
  REDIS_URL: "redis://:REPLACE_WITH_SECURE_PASSWORD@erp_solution-redis:6379/0"

  # JWT
  JWT_SECRET: "REPLACE_WITH_256_BIT_SECRET"
  JWT_REFRESH_SECRET: "REPLACE_WITH_256_BIT_SECRET"

  # API Keys
  OPENAI_API_KEY: "REPLACE_WITH_OPENAI_KEY"
  SENTRY_AUTH_TOKEN: "REPLACE_WITH_SENTRY_TOKEN"
  EXPO_ACCESS_TOKEN: "REPLACE_WITH_EXPO_TOKEN"

  # AWS/S3
  AWS_ACCESS_KEY_ID: "REPLACE_WITH_AWS_KEY"
  AWS_SECRET_ACCESS_KEY: "REPLACE_WITH_AWS_SECRET"

  # SMTP
  SMTP_USER: "REPLACE_WITH_SMTP_USER"
  SMTP_PASSWORD: "REPLACE_WITH_SMTP_PASSWORD"

  # Payment Gateways
  KBZPAY_API_KEY: "REPLACE_WITH_KBZPAY_KEY"
  KBZPAY_MERCHANT_ID: "REPLACE_WITH_KBZPAY_MERCHANT"
  WAVE_API_KEY: "REPLACE_WITH_WAVE_KEY"
  WAVE_MERCHANT_ID: "REPLACE_WITH_WAVE_MERCHANT"

  # OAuth
  GOOGLE_CLIENT_ID: "REPLACE_WITH_GOOGLE_CLIENT_ID"
  GOOGLE_CLIENT_SECRET: "REPLACE_WITH_GOOGLE_CLIENT_SECRET"
  FACEBOOK_APP_ID: "REPLACE_WITH_FACEBOOK_APP_ID"
  FACEBOOK_APP_SECRET: "REPLACE_WITH_FACEBOOK_APP_SECRET"

  # Encryption
  ENCRYPTION_KEY: "REPLACE_WITH_32_BYTE_KEY"
  SIGNING_KEY: "REPLACE_WITH_32_BYTE_KEY"

