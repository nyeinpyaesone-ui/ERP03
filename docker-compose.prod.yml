version: "3.8"

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: erp-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-erp}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
      POSTGRES_DB: ${DB_NAME:-erp_solution}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backups:/backups
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-erp}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - erp-network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: erp-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-changeme}
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - erp-network

  # Backend API
  backend:
    image: powerrangeranikg/erp-solution-backend:latest
    container_name: erp-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${DB_USER:-erp}:${DB_PASSWORD:-changeme}@postgres:5432/${DB_NAME:-erp_solution}
      REDIS_URL: redis://:${REDIS_PASSWORD:-changeme}@redis:6379/0
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      ENVIRONMENT: production
      OLLAMA_URL: http://ollama:11434
      CORS_ORIGINS: ${CORS_ORIGINS:-https://yourdomain.com}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - backend_logs:/app/logs
    networks:
      - erp-network

  # Frontend Web App
  frontend:
    image: powerrangeranikg/erp-solution-frontend:latest
    container_name: erp-frontend
    restart: unless-stopped
    environment:
      REACT_APP_API_URL: ${API_URL:-https://api.yourdomain.com}
      REACT_APP_WS_URL: ${WS_URL:-wss://api.yourdomain.com}
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - erp-network

  # Ollama AI Service
  ollama:
    image: ollama/ollama:latest
    container_name: erp-ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - erp-network

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: erp-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
      - ./logs/nginx:/var/log/nginx
    depends_on:
      - backend
      - frontend
    networks:
      - erp-network

volumes:
  postgres_data:
  redis_data:
  ollama_data:
  backend_logs:

networks:
  erp-network:
    driver: bridge
